# Data-refresh workflow.
#
# Regenerates the real season index / next race, the synthetic sample, and the
# real latest-race replay, then commits public-data/ back to the repo.
#
# Triggers: manual (workflow_dispatch) any time, plus a weekly schedule the
# morning after a typical race Sunday. A run always updates `generatedAt`, so it
# commits weekly even when there's no new race — that's an intentional "heartbeat"
# for a data project; comment out `schedule` if you prefer manual-only.

name: Generate data

on:
  workflow_dispatch:
    inputs:
      year:
        description: "Season year"
        required: true
        default: "2026"
  schedule:
    - cron: "0 8 * * MON" # Mondays 08:00 UTC

permissions:
  contents: write

concurrency:
  group: generate-data
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with data extra
        run: pip install -e '.[data]'

      - name: Resolve season year
        id: year
        run: echo "value=${{ inputs.year || '2026' }}" >> "$GITHUB_OUTPUT"

      - name: Season index + next race (real FastF1)
        run: python -m f1pitwall generate-season-index --year "${{ steps.year.outputs.value }}"

      - name: Synthetic sample replay (offline demo race)
        run: python -m f1pitwall generate-replay --demo --year "${{ steps.year.outputs.value }}"

      - name: Latest real race replay (becomes latest-replay.json)
        continue-on-error: true # a mid-season gap or data hiccup shouldn't fail the run
        run: python -m f1pitwall generate-replay --year "${{ steps.year.outputs.value }}" --race latest

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public-data
          if git diff --staged --quiet; then
            echo "No data changes to commit."
          else
            git commit -m "chore(data): refresh generated data [skip ci]"
            git push
          fi
